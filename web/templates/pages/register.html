{% extends 'layouts/base.html' %}

{% block title %}Home{% endblock title %}

{% block navigation %}
{% include "layouts/navbar.html" with path='home' %}
{% endblock navigation %}

{% block main %}
<div class="container">
    <p>Register form</p>
    <form method="post">
        {% csrf_token %}
        <label for="name">Name: </label><br>
        <input type="text" name="name" id="name"><br>
        <label for="role">Role: </label><br>
        <input type="text" name="role" id="role" required><br>
        <label for="age">Age: </label><br>
        <input type="number" name="age" id="age" min="18" max="60" required><br>
        <label for="password">Password: </label>
        <input type="password" id="password" name="password" minlength="6" maxlength="20" required><br>
        <label for="confirm_password">Confirm password: </label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="6" maxlength="20" required><br>
        <button type="submit">Register</button>
    </form>
</div>
{% endblock main %}
